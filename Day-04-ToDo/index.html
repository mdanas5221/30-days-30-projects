<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo Buddy</title>
    <link rel="stylesheet" href="style.css" />
    <!-- FONT AWSOME ICONS LINK -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <!-- GOGGLE FONTS LINK -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Titan+One&family=Varela+Round&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- HEADING -->
    <h1>ToDo Buddy</h1>

    <!-- MAIN CONTAINER -->
    <div class="container">
      <!-- INPUT CONTAINER -->
      <div class="input-box">
        <input type="text" id="input" placeholder="Add today's task..." />
        <button id="add-btn">Add</button>
      </div>

      <!-- LI BOX -->
      <div class="content-box">
        <ul class="task-box"></ul>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
