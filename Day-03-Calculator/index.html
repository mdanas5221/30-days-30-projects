<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <!-- CSS FILE LINK -->
    <link rel="stylesheet" href="style.css" />

    <!-- GOGGLE FONTS LINK -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Titan+One&family=Varela+Round&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="theme-box">
      <img src="assets/sun.png" id="theme-btn">
    </div>
    <div class="container">
      <div class="input-box">
        <input type="text" placeholder="0" readonly />
      </div>
      <div class="btn-box">
        <button class="operator">AC</button>
        <button class="operator">DE</button>
        <button class="operator">%</button>
        <button class="operator">/</button>

        <button class="num">7</button>
        <button class="num">8</button>
        <button class="num">9</button>
        <button class="operator">*</button>

        <button class="num">4</button>
        <button class="num">5</button>
        <button class="num">6</button>
        <button class="operator">-</button>

        <button class="num">1</button>
        <button class="num">2</button>
        <button class="num">3</button>
        <button class="operator">+</button>

        <button class="num">0</button>
        <button class="num">.</button>
        <button id="equal-btn">=</button>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
