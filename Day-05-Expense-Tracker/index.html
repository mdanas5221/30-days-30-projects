<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Titan+One&family=Varela+Round&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="main-container">
        <div class="balance-box">
          <p>Your Balance</p>
          <h2 id="balance">$0.00</h2>
        </div>

        <div class="income-expanse-boxes">
          <div class="box">
            <div class="income-icon icon">
              <i class="fa-solid fa-arrow-trend-up"></i>
            </div>
            <div class="income-box">
              <p>Income</p>
              <h2 id="total-income">$0.00</h2>
            </div>
          </div>

          <div class="box">
            <div class="expense-icon icon">
              <i class="fa-solid fa-arrow-trend-down"></i>
            </div>
            <div class="expense-box">
              <p>Expense</p>
              <h2 id="total-expense">$0.00</h2>
            </div>
          </div>
        </div>

        <div class="add-transaction-box">
          <h2>Add Transaction</h2>

          <div class="select-box">
            <select id="select">
              <option>Select Type</option>
              <option>Income</option>
              <option>Expense</option>
            </select>
          </div>

          <div class="trans-box">
            <input
              type="text"
              placeholder="Enter Description"
              id="description"
            />
          </div>

          <div class="trans-box">
            <input type="text" placeholder="Enter Amount" id="amount" />
          </div>

          <button class="btn" id="add-btn">
            <span>+</span> Add Transaction
          </button>
        </div>
      </div>

      <div class="history-container">
        <div class="his-con-brand-box">
          <div class="icon logo">
            <i class="fa-solid fa-chart-line"></i>
          </div>
          <div class="brand-heading">
            <h1>Expense Tracker</h1>
            <p>Track, Manage, Grow</p>
          </div>
        </div>
        <div class="history-table">
          <div class="history-heading">
            <h2>Transaction History</h2>
            <div class="line"></div>
          </div>

          <div class="table">
            <div class="table-heading row">
              <p>DATE</p>
              <p>TYPE</p>
              <p>DESCRIPTION</p>
              <p>AMOUNT</p>
              <p>ACTION</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
